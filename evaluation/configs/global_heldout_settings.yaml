  hanabi: # Full 2-player Hanabi (5 colors, 5 ranks) held-out partner set
    # random_agent and rule_based agents work out-of-the-box.
    # obl_r2d2 requires downloading pretrained weights:
    #   bash agents/hanabi/download_obl_r2d2.sh
    # Performance bounds use BR diagonal scores as empirical upper bounds
    # (ROTATE framework, Wang 2025). Partners with BR score = 0 retain
    # theoretical max [0, 25] to avoid division by zero.
    random_agent:
      actor_type: random_agent
      performance_bounds:
        returned_episode_returns: [0.0, 25.0] # BR=0.0, keep theoretical max
    rule_based_cautious:
      actor_type: rule_based
      strategy: cautious
      performance_bounds:
        returned_episode_returns: [0.0, 4.12]
    rule_based_aggressive:
      actor_type: rule_based
      strategy: aggressive
      performance_bounds:
        returned_episode_returns: [0.0, 25.0] # BR=0.0, keep theoretical max
    rule_based_communicative:
      actor_type: rule_based
      strategy: communicative
      performance_bounds:
        returned_episode_returns: [0.0, 3.70]
    rule_based_frugal:
      actor_type: rule_based
      strategy: frugal
      performance_bounds:
        returned_episode_returns: [0.0, 1.77]
    iggi:
      actor_type: iggi
      performance_bounds:
        returned_episode_returns: [0.0, 13.33]
    piers:
      actor_type: piers
      play_threshold: 0.6
      hint_threshold: 4
      performance_bounds:
        returned_episode_returns: [0.0, 10.69]
    flawed_30:
