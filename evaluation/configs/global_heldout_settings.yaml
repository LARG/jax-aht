      performance_bounds:
        returned_episode_returns: [0.0, 11.66]
    obl_r2d2_l4:
      actor_type: obl_r2d2
      weight_file: agents/hanabi/obl-r2d2-flax/icml_OBL4/OFF_BELIEF1_SHUFFLE_COLOR0_LOAD1_BZA0_BELIEF_a.safetensors
      performance_bounds:
