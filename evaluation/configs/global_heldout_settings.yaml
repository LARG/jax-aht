      greedy: true
      performance_bounds:
        returned_episode_returns: [0.0, 4.39]
    # MLP IPPO self-play (1e9 steps, 3 seeds, FC_HIDDEN_DIM=64).
    # Self-play: seed0 17.19, seed1 15.50, seed2 14.48. BR: 12.17, 10.36, 11.87.
