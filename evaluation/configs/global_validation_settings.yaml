# @package _global_
# THIS SCRIPT CONTAINS THE PATHS FOR THE HELDOUT EVALUATION. MODIFY WITH CAUTION.
global_heldout_settings:
  EVAL_SEED: 3209581
  MAX_EPISODE_STEPS: ${task.ROLLOUT_LENGTH}
  NUM_EVAL_EPISODES: 64
  AGGREGATE_STAT: mean # choices: mean, iqm. both are computed with the bootstrapped CI using rliable.
  NORMALIZE_RETURNS: true # if true, use performance bounds to normalize returns

heldout_set:
  lbf: # DONE - DO NOT MODIFY. In LBF, results are much better with test mode = false.
    ippo-mlp: 
      path: "eval_teammates/lbf/2026-03-01_22-16-22/saved_train_run"
      actor_type: mlp
      ckpt_key: checkpoints
      idx_list: [[0, 1], [1, -1]] # load in seed 0 ckpt 1 and seed 1 ckpt -1
      test_mode: false
      performance_bounds:
        percent_eaten: [[0.0, 59.38], [0.0, 98.96]]
        returned_episode_returns: [[0.0, 0.30], [0.0, 0.49]]
    brdiv-conf: 
      path: "eval_teammates/lbf/2026-03-01_22-51-07/saved_train_run"
      actor_type: actor_with_conditional_critic
      idx_list: [[0, 0], [0, 1], [0, 2]] # Select all agents in population for seed 0.
      ckpt_key: final_params_conf # key to load from checkpoint.
      POP_SIZE: 3 # for brdiv, we need to specify population size that the method was trained with
      test_mode: false
      performance_bounds:
        percent_eaten: [[0.0, 98.44], [0.0, 93.75], [0.0, 100.00]]
        returned_episode_returns: [[0.0, 0.49], [0.0, 0.47], [0.0, 0.50]]
