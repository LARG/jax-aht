# Hanabi: evaluation task config.
# Full 2-player Hanabi. Used by evaluation/heldout_eval.py with task=hanabi.
ENV_NAME: hanabi
ROLLOUT_LENGTH: 128
ENV_KWARGS:
  num_agents: 2
  num_colors: 5
  num_ranks: 5
  hand_size: 5
  max_info_tokens: 8
  max_life_tokens: 3
  num_cards_of_rank: [3, 2, 2, 2, 1]
TASK_NAME: hanabi
