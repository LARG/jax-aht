# @package _global_
# BC-only heldout set for ego × BC cross-play eval.
#
# Mirrors the structure of `global_heldout_settings.yaml` but the per-task
# `heldout_set` lists only the BC human-proxy partners (not the diverse
# ippo_mlp/brdiv/comedi/heuristic pool). Use this file as a defaults entry
# (instead of `global_heldout_settings`) when running heldout-eval against
# BC partners only.
#
# Performance bounds: lo=0.0 (returns are non-negative); hi = max-of-3-seed
# end-of-training BR `eval_ep_last_info` value for that BC partner, extracted
# from the BR runs in §3 of RUNS_INVENTORY.md (= the BR ceiling for that BC).
# `percent_eaten` ceiling = 2 × `returned_episode_returns` ceiling (LBF ratio).

global_heldout_settings:
  EVAL_SEED: 34957
  MAX_EPISODE_STEPS: ${task.ROLLOUT_LENGTH}
  NUM_EVAL_EPISODES: 64
  AGGREGATE_STAT: mean
  NORMALIZE_RETURNS: true

heldout_set:
  overcooked-v1/coord_ring:
    bc_run_0:
      actor_type: bc_proxy
      run_id: 0
      test_mode: true
      performance_bounds:
        returned_episode_returns: [0.0, 228.85]
        base_return: [0.0, 215.00]
