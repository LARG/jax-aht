defaults:
  - task: overcooked-v1/cramped_room # task configs
  - hydra: hydra_simple
  - _self_

ENV_NAME: ${task.ENV_NAME}
ENV_KWARGS: ${task.ENV_KWARGS}
TASK_NAME: ${task.TASK_NAME}

label: ""
name: ${TASK_NAME}/human_proxy_eval/${label}

global_heldout_settings:
  EVAL_SEED: 34957
  MAX_EPISODE_STEPS: ${task.ROLLOUT_LENGTH}
  NUM_EVAL_EPISODES: 64
  AGGREGATE_STAT: mean # choices: mean, iqm. both are computed with the bootstrapped CI using rliable.
  NORMALIZE_RETURNS: true # if true, use performance bounds to normalize returns

ego_set:
  overcooked-v1/cramped_room:
    comedi:
      path: results/overcooked-v1/cramped_room/comedi/paper-v0/2025-05-14_11-48-41/ego_train_run
      actor_type: s5
      idx_list: [[0, -1], [1, -1], [2, -1]]
      ckpt_key: final_params
      test_mode: false

heldout_set:
  overcooked-v1/cramped_room:
    bc_proxy:
      actor_type: bc_proxy
      test_mode: true # BC policy performs better with test mode
      performance_bounds:
        base_return: [0.0, 196.250] # normalization bounds obtained from BC self-play
        returned_episode_returns: [0.0, 209.655] # shaped return for Overcooked-v1
