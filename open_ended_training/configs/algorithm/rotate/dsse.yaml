defaults:
  - rotate/_base_
  - _self_

# DSSE 2-drone ROTATE config. ROTATE produces an open-ended training
# curriculum by alternating confederate and ego updates. Inherits the
# num_agents == 2 assertion from ppo_ego, so DSSE is run in 2-drone mode.
TIMESTEPS_PER_ITER_PARTNER: 2e6
TIMESTEPS_PER_ITER_EGO: 1e6
NUM_OPEN_ENDED_ITERS: 20
REGRET_SP_WEIGHT: 1.0
LR: 3e-4
CLIP_EPS: 0.2
ENT_COEF: 0.01
ANNEAL_LR: false
EGO_ARGS:
  LR: 3e-4
  ENT_COEF: 0.01
  CLIP_EPS: 0.2
  ANNEAL_LR: false
  UPDATE_EPOCHS: 10
