# @package algorithm
# ^ tells hydra to place these value directly under algorithm key
ALG: trajedi
TOTAL_TIMESTEPS: 1e8 # per iter of open-ended training, divided between conf-br and conf-ego and between all partner seeds
NUM_CHECKPOINTS: 2 # num checkpoints
PARTNER_POP_SIZE: 5 # true pop size is PARTNER_POP_SIZE * NUM_CHECKPOINTS per iter of open-ended training
NUM_ENVS_CONFS: 80
NUM_ENVS_BR: 16
TRAJEDI_COEF: 0.0

LR: 1.e-4
UPDATE_EPOCHS: 20
NUM_MINIBATCHES: 4
GAMMA: 0.99
GAE_LAMBDA: 0.95
CLIP_EPS: 0.05
ENT_COEF: 0.01
VF_COEF: 0.5
MAX_GRAD_NORM: 1.0
ANNEAL_LR: false