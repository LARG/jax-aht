defaults:
  - paired/_base_
  - _self_

# DSSE 2-drone PAIRED config. PAIRED co-trains a confederate
# population and an ego agent against a regret objective. Inherits the
# num_agents == 2 assertion from ppo_ego, so DSSE is run in 2-drone mode.
TOTAL_TIMESTEPS: 3e7
LR: 3e-4
CLIP_EPS: 0.2
ENT_COEF: 0.01
NUM_ENVS: 32
UPDATE_EPOCHS: 10
NUM_MINIBATCHES: 4
