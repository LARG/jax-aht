program: social_laws/run_single_agent.py
name: creppo-rddl-grid-10x10-alternating-toroidal-no-restrictions
method: bayes
entity: social-laws-project
project: social-laws-param-sweep
metric:
  goal: maximize
  name: Eval/Agent_1_Proj/Return

parameters:
  # algorithm.TOTAL_TIMESTEPS:
  #   values: []
  # algorithm.NUM_ENVS:
  #   values: []
  algorithm.ACTIVATION:
    values: ["tanh", "relu"]
  algorithm.LR:
    values: [5e-5, 3e-5, 3e-4, 3e-3, 3e-2]
  algorithm.NUM_EPOCHS:
    values: [4, 8, 16]
  algorithm.GAMMA:
    values: [0.95, 0.99]
  algorithm.LAMBDA:
    distribution: uniform
    min: 0.0
    max: 1.0
  algorithm.TARGET_ENTROPY_MULT:
    values: [0.1, 0.05, 0.01, 0.001, 0.0001]
  algorithm.KL_BOUND:
    values: [null]

command:
  - ${env}
  - python
  - ${program}
  - task=rddl/grid_10x10_alternating/toroidal_no_restrictions
  - algorithm=creppo/rddl/grid_10x10_alternating/toroidal_full_restrictions
  - algorithm.TRAIN_SEED=714212835
  - algorithm.EVAL_SEED=212835427
  - algorithm.FIXED_EVAL=true
  - task.NUM_EVAL_EPISODES=100
  - logger.project=social-laws-param-sweep
  - logger.entity=social-laws-project
  - logger.mode=online
  - logger.log_train_out=false
  - local_logger.save_train_out=false
  - local_logger.save_eval_out=false
  - label="param_sweep"
  - ${args_no_hyphens}
