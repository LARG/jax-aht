# Environment
grid_size: 1.5
ego_centric_obs: true
horizon: 100              # Increased horizon for the 1.5 grid
min_sep_goal: 0.50        # Goals spread further apart

# Reward
step_penalty: -0.01       # 0 is dense, -1 is sparse
collision_penalty: -10.0
capture_reward: 10.0
detect_reward: 1.0        # Same as v29/v31/v32

# Geometry
agent_radius: 0.05
capture_radius: 0.075     # Scaled proportionally to min_sep_goal
detect_radius: 0.2
sensor_radius: 0.50

# Continuous action
max_acceleration: 1.0     
max_velocity: 1.0         
drag_factor: 5.0          

# Physics
simulation_steps: 5
gaussian_noise: 0.02
