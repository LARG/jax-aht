ENV_NAME: continuous/coop_recon_n_agent
ROLLOUT_LENGTH: 128
NUM_EVAL_EPISODES: 50  # Keep at 50 to avoid GPU OOM for N=5
ENV_KWARGS: {
    instance: "",
    render: true,
    render_name: "coop_recon_n_agent_5",
    render_dir: "render",
    num_agents: 5,
    grid_size: 1.5,            # Scaled up from V41's 1.0 — same per-agent density as N=3 baseline
    ego_centric_obs: true,     # Required for N-agent scalability
    movement_noise_std: 0.1,
    done_condition: "all",
    horizon: 200,              # Same as V41
    collision_radius: 0.05,
    min_sep_goal: 0.25,        # Slightly larger than V41's 0.20, feasible in 1.5 grid
  }
TASK_NAME: continuous/coop_recon_n_agent_5
SINGLE_AGENT_1_PROJECTION: ""
SINGLE_AGENT_2_PROJECTION: ""
SINGLE_AGENT_3_PROJECTION: ""
SINGLE_AGENT_4_PROJECTION: ""
SINGLE_AGENT_5_PROJECTION: ""
ALPHA_COST: false
