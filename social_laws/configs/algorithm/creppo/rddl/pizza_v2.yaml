defaults:
  - creppo/_base_
  - _self_ # values from this file override the values from the base file

TOTAL_TIMESTEPS: 3e6
TOTAL_TIMESTEPS_DECAY: 3e6
LR: 0.0003

NUM_MINIBATCHES: 160

TARGET_ENTROPY_MULT: 0.01
GAMMA: 0.99
# SAP value bounds.
# Observed SAP episode return: -200 (40 steps x -1 x 5 orders, no collision possible).
# Buffer added for safety.
VMIN: -20000
VMAX: 0

# Joint value bounds.
JOINT_VMIN: -25000
JOINT_VMAX: 0

# Increase bins so bin_width = 20000/499 ≈ 40 units — enough to distinguish
# -200 from -400 (5 bins apart) without triggering the mysterious -14800 issue
# that appears when VMIN is set tight (-250/-500).
NUM_BINS: 500

ANNEAL_LR: false
NUM_EPOCHS: 4

S5_D_MODEL: 128
S5_SSM_SIZE: 128
S5_ACTOR_CRITIC_HIDDEN_DIM: 1024
FC_N_LAYERS: 3
