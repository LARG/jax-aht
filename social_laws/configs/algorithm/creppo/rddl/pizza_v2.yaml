defaults:
  - creppo/_base_
  - _self_ # values from this file override the values from the base file

TOTAL_TIMESTEPS: 3e6
TOTAL_TIMESTEPS_DECAY: 3e6
LR: 0.0003

NUM_MINIBATCHES: 160

TARGET_ENTROPY_MULT: 0.01
GAMMA: 0.99
# SAP value bounds.
# Observed episode returns on TACC SPR ~-14800 (37x the theoretical -400, likely
# due to Intel XPU JAX reward scaling). Set VMIN well below observed minimum.
VMIN: -20000
VMAX: 0

# Joint value bounds: match SAP scale, plus collision penalty headroom.
JOINT_VMIN: -25000
JOINT_VMAX: 0

ANNEAL_LR: false
NUM_EPOCHS: 4

S5_D_MODEL: 128
S5_SSM_SIZE: 128
S5_ACTOR_CRITIC_HIDDEN_DIM: 1024
FC_N_LAYERS: 3
