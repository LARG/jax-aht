defaults:
  - creppo/_base_
  - _self_ # values from this file override the values from the base file

TOTAL_TIMESTEPS: 3e6
TOTAL_TIMESTEPS_DECAY: 3e6
LR: 0.0003

NUM_MINIBATCHES: 160

TARGET_ENTROPY_MULT: 0.01
GAMMA: 0.99
# SAP value bounds: rewards are always <= 0.
# Worst case for one agent: -1 step-penalty × 5 orders × 40 steps = -200.
# Buffer added for safety margin.
VMIN: -250
VMAX: 0

# Joint value bounds: worst case is collision at step 1 with all 10 orders pending.
# Per-truck: COLLISION_PENALTY(-220) + STEP_PENALTY(-1)*credits(5) = -225 each.
# Combined (if reward is summed): -450 total at that step.
JOINT_VMIN: -500
JOINT_VMAX: 0

ANNEAL_LR: false
NUM_EPOCHS: 4

S5_D_MODEL: 128
S5_SSM_SIZE: 128
S5_ACTOR_CRITIC_HIDDEN_DIM: 1024
FC_N_LAYERS: 3
