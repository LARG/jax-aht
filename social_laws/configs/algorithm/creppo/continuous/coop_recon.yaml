defaults:
  - creppo/_base_
  - _self_ # values from this file override the values from the base file

TOTAL_TIMESTEPS: 6e7
TOTAL_TIMESTEPS_DECAY: 6e7

NUM_ENVS: 1000 # parallel environments
NUM_EPOCHS: 8 # number of epochs per update
NUM_MINIBATCHES: 128 # minibatches per epoch

LR: 0.0003

KL_BOUND: null

LAMBDA: 0.6271779100545157

TARGET_ENTROPY_MULT: 0.0001 # sum (action probabilities) * log(action probabilities), max entropy
GAMMA: 0.95
VMIN: -1 # Phase A: horizon 60 → max step penalty = -0.60. VMIN=-1 gives ample margin.
VMAX: 25  # increased from 15: actual observed episode returns reach ~20, so 25 gives headroom

ANNEAL_LR: false

S5_D_MODEL: 128
S5_SSM_SIZE: 128
S5_ACTOR_CRITIC_HIDDEN_DIM: 1024
FC_N_LAYERS: 3
