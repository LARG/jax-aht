defaults:
  - brdiv/_base_
  - _self_

# Full 2-player Hanabi BRDiv config. Generates a diverse partner
# population by maximizing the best-response diversity metric, then
# trains an ego agent against the population.
TOTAL_TIMESTEPS: 2e7
PARTNER_POP_SIZE: 3
NUM_ENVS: 32
XP_LOSS_WEIGHTS: 0.05
LR: 3e-4
UPDATE_EPOCHS: 10
NUM_MINIBATCHES: 4
CLIP_EPS: 0.2
ENT_COEF: 0.01
ego_train_algorithm:
  TOTAL_TIMESTEPS: 1e7
  LR: 3e-4
  ENT_COEF: 0.01
  CLIP_EPS: 0.2
  ANNEAL_LR: false
  UPDATE_EPOCHS: 10
