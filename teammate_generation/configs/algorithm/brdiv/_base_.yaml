# @package algorithm
# ^ tells hydra to place these value directly under algorithm key
ALG: brdiv
TOTAL_TIMESTEPS: 4.5e7  # divided among each pair of BR and Conf agents
NUM_CHECKPOINTS: 5
PARTNER_POP_SIZE: 4
NUM_ENVS: 64
# SP weight = 1 + 2*XP weight.
# Thus, as XP weight -> 0, SP/(SP+XP) -> 1.
# If XP weight -> infinity, XP/(SP+XP) -> 1/3, and SP/(SP+XP) -> 2/3.
XP_LOSS_WEIGHTS: 1
LR: 1e-4
UPDATE_EPOCHS: 15
NUM_MINIBATCHES: 4
GAMMA: 0.99
GAE_LAMBDA: 0.95
CLIP_EPS: 0.05
ENT_COEF: 0.01
VF_COEF: 0.5
MAX_GRAD_NORM: 1.0
ANNEAL_LR: false
ACTIVATION: tanh
ego_train_algorithm:
  EGO_ACTOR_TYPE: s5
  TOTAL_TIMESTEPS: 1e7
  NUM_CHECKPOINTS: 5
  NUM_ENVS: 256
  LR: 1e-4
  UPDATE_EPOCHS: 15
  NUM_MINIBATCHES: 4
  GAMMA: 0.99
  GAE_LAMBDA: 0.95
  CLIP_EPS: 0.05
  ENT_COEF: 0.01
  VF_COEF: 0.5
  MAX_GRAD_NORM: 1.0
  ANNEAL_LR: true