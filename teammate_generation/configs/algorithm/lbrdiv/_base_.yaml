# @package algorithm
# ^ tells hydra to place these value directly under algorithm key
ALG: lbrdiv
TOTAL_TIMESTEPS: 1e8  # divided among each pair of BR and Conf agents
NUM_CHECKPOINTS: 5
PARTNER_POP_SIZE: 4
NUM_ENVS: 64
TOLERANCE_FACTOR: 0.1 # require that SP - XP > TOLERANCE_FACTOR
LAGRANGE_LR: 0.01 # specific to L-BRDiv
LR: 1e-4
UPDATE_EPOCHS: 15
NUM_MINIBATCHES: 4
GAMMA: 0.99
GAE_LAMBDA: 0.95
CLIP_EPS: 0.05
ENT_COEF: 0.01
VF_COEF: 0.5
MAX_GRAD_NORM: 1.0
ANNEAL_LR: false
ACTIVATION: tanh
ego_train_algorithm:
  EGO_ACTOR_TYPE: s5
  TOTAL_TIMESTEPS: 1e7
  NUM_CHECKPOINTS: 5
  NUM_ENVS: 512
  LR: 1e-4
  UPDATE_EPOCHS: 15
  NUM_MINIBATCHES: 4
  GAMMA: 0.99
  GAE_LAMBDA: 0.95
  CLIP_EPS: 0.05
  ENT_COEF: 0.01
  VF_COEF: 0.5
  MAX_GRAD_NORM: 1.0
  ANNEAL_LR: true