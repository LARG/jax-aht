defaults:
  - fcp/_base_
  - _self_

# Full 2-player Hanabi FCP config. Trains IPPO partners then ego.
# Hyperparameters aligned with JaxMARL Hanabi consensus.
#
# PARTNER_POP_SIZE=3 (not 10): FCP vmaps across pop size, so 10
# parallel IPPO instances with 658-dim obs OOMs on 48GB. 3 partners
# x 5 checkpoints = 15 total partners, enough for diversity.
TOTAL_TIMESTEPS: 1e9
PARTNER_POP_SIZE: 3
LR: 5e-4
NUM_ENVS: 32
UPDATE_EPOCHS: 4
NUM_MINIBATCHES: 4
CLIP_EPS: 0.2
ENT_COEF: 0.01
ANNEAL_LR: true
GAMMA: 0.999
GAE_LAMBDA: 0.95
MAX_GRAD_NORM: 0.5
ego_train_algorithm:
  TOTAL_TIMESTEPS: 1e9
  LR: 5e-4
  ENT_COEF: 0.01
  CLIP_EPS: 0.2
  ANNEAL_LR: true
  UPDATE_EPOCHS: 4
  GAMMA: 0.999
  GAE_LAMBDA: 0.95
  MAX_GRAD_NORM: 0.5
