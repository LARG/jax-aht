
program: teammate_generation/run.py
name: lbrdiv-overcooked-v1-coord_ring
project: aht-parameter-sweep
method: bayes
entity: aht-project
metric:
  goal: maximize
  name: HeldoutEval/FinalEgoVsHeldout/returned_episode_returns/mean

parameters:
  algorithm.PARTNER_POP_SIZE:
    values: [3, 5, 10]
  algorithm.NUM_ENVS: # affects XP return estimation
    values: [64, 512, 1024]
  algorithm.LAGRANGE_LR:
    values: [0.005, 0.01, 0.05, 0.2]
  algorithm.TOLERANCE_FACTOR:
    values: [5.0, 10.0, 20.0]
  algorithm.LR:
    values: [1e-4, 5e-4, 1e-3]
  algorithm.ENT_COEF:
    values: [0.05, 0.03, 0.01, 0.005]

command:
  - ${env}
  - python
  - ${program}
  - task=overcooked-v1/coord_ring
  - algorithm=lbrdiv/overcooked-v1/coord_ring
  - train_ego=true
  - run_heldout_eval=true
  - local_logger.save_train_out=false
  - local_logger.save_eval_out=false
  - algorithm.ego_train_algorithm.NUM_ENVS=512
  - ${args_no_hyphens}
