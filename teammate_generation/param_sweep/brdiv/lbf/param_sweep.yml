program: teammate_generation/run.py
name: brdiv-lbf
method: grid # bayes
entity: aht-project
project: aht-parameter-sweep
metric:
  goal: maximize
  name: HeldoutEval/FinalEgoVsHeldout/returned_episode_returns/mean

# 432 Combinations: grid search possible instead of bayes
parameters:
  algorithm.PARTNER_POP_SIZE:
    values: [3, 5, 10]
  algorithm.NUM_ENVS: # affects XP return estimation
    values: [64, 512, 1024]
  algorithm.XP_LOSS_WEIGHTS:
    values: [0.001, 0.01, 0.05, 0.1]
  algorithm.LR:
    values: [1e-5, 1e-4, 1e-3]
  algorithm.ENT_COEF:
    values: [0.05, 0.03, 0.01, 0.005]

command:
  - ${env}
  - python
  - ${program}
  - task=lbf
  - algorithm=brdiv/lbf
  - train_ego=true
  - run_heldout_eval=true
  - logger.log_train_out=false
  - local_logger.save_train_out=false
  - local_logger.save_eval_out=false
  - algorithm.TOTAL_TIMESTEPS=1e8
  - algorithm.ego_train_algorithm.TOTAL_TIMESTEPS=3e7
  - ${args_no_hyphens}
