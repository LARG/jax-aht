command:
  - ${env}
  - python
  - ${program}
  - task=lbf
  - algorithm=lbrdiv/lbf
  - ${args_no_hyphens}
early_terminate:
  min_iter: 8
  type: hyperband
entity: aht-project
method: bayes
metric:
  goal: maximize
  name: eval/ego_return_mean
name: lbrdiv-lbf
parameters:
  algorithm.PARTNER_POP_SIZE:
    values: [3, 4, 5]
  algorithm.LAGRANGE_LR:
    values: [0.005, 0.01, 0.05]
  algorithm.TOLERANCE_FACTOR:
    values: [0.05, 0.1, 0.2]
  algorithm.LR:
    values: [1e-4, 5e-4, 1e-3]
  algorithm.ENT_COEF:
    values: [0.01, 0.02, 0.05]
  algorithm.ego_train_algorithm.LR:
    values: [5e-5, 1e-4, 3e-4]
  algorithm.ego_train_algorithm.ENT_COEF:
    values: [0.01, 0.02]
  run_heldout_eval:
    value: false
  train_ego:
    value: true
  seed:
    value: 0
program: teammate_generation/run.py
project: aht-parameter-sweep