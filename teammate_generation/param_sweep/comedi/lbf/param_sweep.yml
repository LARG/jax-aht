program: teammate_generation/run.py
name: CoMeDi-lbf
method: bayes
entity: aht-project
project: aht-parameter-sweep
metric:
  goal: maximize
  name: HeldoutEval/FinalEgoVsHeldout/returned_episode_returns/mean

# 900 Combinations: bayes search recommended over grid
parameters:
  algorithm.PARTNER_POP_SIZE:
    values: [8, 12, 16]
  algorithm.COMEDI_ALPHA:
    values: [0.1, 0.2, 0.4, 0.6, 0.8, 0.9, 1.0]
  algorithm.COMEDI_BETA:
    values: [0.1, 0.2, 0.4, 0.6, 0.8, 0.9, 1.0]
  algorithm.LR:
    values: [1e-5, 1e-4, 1e-3]
  algorithm.ENT_COEF:
    values: [0.05, 0.03, 0.01, 0.005]

command:
  - ${env}
  - python
  - ${program}
  - task=lbf
  - algorithm=comedi/lbf
  - train_ego=true
  - run_heldout_eval=true
  - logger.log_train_out=false
  - local_logger.save_train_out=false
  - local_logger.save_eval_out=false
  - label="param_sweep"
  - algorithm.TOTAL_TIMESTEPS_PER_ITERATION=6e6
  - algorithm.ego_train_algorithm.TOTAL_TIMESTEPS=3e7
  - ${args_no_hyphens}
