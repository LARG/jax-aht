defaults:
  - liam_ego/_base_
  - _self_

# Settings used for the writeup (writeup/dsse.tex).
# scripts/run_jax_ego_training.sh launches with these defaults; running
# ego_agent_training/run.py without overrides reproduces the same config.
TOTAL_TIMESTEPS: 10000000
NUM_ENVS: 32
NUM_EGO_TRAIN_SEEDS: 3
LR: 3e-4
ENCODER_DECODER_LR: 7e-4
ENT_COEF: 0.01
CLIP_EPS: 0.1
ANNEAL_LR: false
UPDATE_EPOCHS: 5
ENCODER_HIDDEN_DIM: 64
ENCODER_OUTPUT_DIM: 20
DECODER_HIDDEN_DIM: 64
POLICY_INPUT_DIM: 20
