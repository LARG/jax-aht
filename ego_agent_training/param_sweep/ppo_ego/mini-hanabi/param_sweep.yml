program: ego_agent_training/run.py
name: ppo_ego-mini-hanabi
method: random
entity: aht-project
project: aht-parameter-sweep
metric:
  goal: maximize
  name: HeldoutEval/FinalEgoVsHeldout/returned_episode_returns/mean

parameters:
  algorithm.LR:
    values: [5e-5, 1e-4, 5e-4, 1e-3]
  algorithm.ENT_COEF:
    values: [0.05, 0.01, 0.001, 0.0001]
  algorithm.CLIP_EPS:
    values: [0.1, 0.2, 0.3]
  algorithm.ACTIVATION:
    values: ["tanh", "relu"]
  algorithm.UPDATE_EPOCHS:
    values: [5, 10, 15]

command:
  - ${env}
  - python
  - ${program}
  - task=mini-hanabi
  - algorithm=ppo_ego/mini-hanabi
  - run_heldout_eval=true
  - logger.log_train_out=false
  - local_logger.save_train_out=false
  - local_logger.save_eval_out=false
  - label="param_sweep"
  - algorithm.TOTAL_TIMESTEPS=7e6
  - ${args_no_hyphens}
