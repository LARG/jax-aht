program: ego_agent_training/run.py
name: meliba_ego-mini-hanabi
method: random
entity: aht-project
project: aht-parameter-sweep
metric:
  goal: maximize
  name: HeldoutEval/FinalEgoVsHeldout/returned_episode_returns/mean

parameters:
  algorithm.LR:
    values: [3e-4, 7e-4, 1e-3]
  algorithm.ENCODER_DECODER_LR:
    values: [3e-4, 7e-4, 1e-3]
  algorithm.ENT_COEF:
    values: [0.05, 0.1, 0.2]
  algorithm.CLIP_EPS:
    values: [0.1, 0.2]
  algorithm.GAE_LAMBDA:
    values: [0.9, 0.95]
  algorithm.ENCODER_LATENT_DIM:
    values: [32, 64, 128]

command:
  - ${env}
  - python
  - ${program}
  - task=mini-hanabi
  - algorithm=meliba_ego/mini-hanabi
  - run_heldout_eval=true
  - logger.log_train_out=false
  - local_logger.save_train_out=false
  - local_logger.save_eval_out=false
  - label="param_sweep"
  - algorithm.TOTAL_TIMESTEPS=7e6
  - ${args_no_hyphens}
